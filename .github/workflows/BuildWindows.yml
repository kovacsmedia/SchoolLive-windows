# .github/workflows/build-windows.yml
#
# Automatikus Windows installer build minden release tagnél (v*.*.*)
# és manuálisan is indítható (workflow_dispatch).
#
# Kimenet:
#   - dist/SchoolLivePlayer.exe       (standalone binary)
#   - installer/SchoolLiveSetup.exe   (Inno Setup telepítő)
#
# A release-hez automatikusan feltölti mindkét fájlt.

name: Build Windows Installer

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Verzió (pl. 1.0.0)"
        required: false
        default: "dev"

jobs:
  build:
    runs-on: windows-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Python ────────────────────────────────────────────────────────────
      - name: Python 3.11 setup
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. Függőségek ────────────────────────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # ── 4. Verzió meghatározás ───────────────────────────────────────────────
      - name: Set version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="${{ github.event.inputs.version || 'dev' }}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      # ── 5. PyInstaller build ─────────────────────────────────────────────────
      - name: Build executable
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --name SchoolLivePlayer `
            --icon assets/icon.ico `
            --add-data "assets;assets" `
            --add-data "schoollive-logo.png;." `
            --hidden-import PyQt6.sip `
            --hidden-import bcrypt `
            main.py
        # Ha nincs icon.ico vagy logo, vedd ki a --icon és --add-data sorokat

      # ── 6. Inno Setup telepítő ───────────────────────────────────────────────
      - name: Download Inno Setup
        run: |
          $url = "https://files.jrsoftware.org/is/6/innosetup-6.3.3.exe"
          Invoke-WebRequest -Uri $url -OutFile innosetup.exe
          Start-Process -FilePath innosetup.exe -Args "/VERYSILENT /SUPPRESSMSGBOXES" -Wait
        shell: powershell

      - name: Build installer
        env:
          APP_VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer/setup.iss
        shell: powershell

      # ── 7. Artifacts feltöltése ──────────────────────────────────────────────
      - name: Upload standalone exe
        uses: actions/upload-artifact@v4
        with:
          name: SchoolLivePlayer-${{ steps.version.outputs.VERSION }}-standalone
          path: dist/SchoolLivePlayer.exe

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: SchoolLivePlayer-${{ steps.version.outputs.VERSION }}-setup
          path: installer/SchoolLiveSetup.exe

      # ── 8. GitHub Release létrehozása (csak tagnél) ──────────────────────────
      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          name: "SchoolLive Player ${{ steps.version.outputs.VERSION }}"
          draft: false
          prerelease: false
          files: |
            dist/SchoolLivePlayer.exe
            installer/SchoolLiveSetup.exe
          body: |
            ## SchoolLive Player ${{ steps.version.outputs.VERSION }}

            ### Telepítés
            - **SchoolLiveSetup.exe** – ajánlott, telepítővarázslóval
            - **SchoolLivePlayer.exe** – standalone, telepítés nélkül futtatható

            ### Változások
            Lásd a commit history-t.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
