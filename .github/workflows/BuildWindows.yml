# .github/workflows/BuildWindows.yml
name: Build Windows Installer

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Verzió (pl. 1.0.0)"
        required: false
        default: "dev"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r Requirements.txt
          pip install pyinstaller

      - name: Set version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="${{ github.event.inputs.version || 'dev' }}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Build executable
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --name SchoolLivePlayer `
            --add-data "schoollive-logo.png;." `
            --add-data "player/fonts;fonts" `
            --paths "player" `
            --hidden-import PyQt6.sip `
            --hidden-import bcrypt `
            player/main.py

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Build installer
        env:
          APP_VERSION: ${{ steps.version.outputs.VERSION }}
        shell: powershell
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (!(Test-Path $iscc)) {
            $iscc = "C:\Program Files\Inno Setup 6\ISCC.exe"
          }
          Write-Host "Using ISCC: $iscc"
          & $iscc installer/setup.iss
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload standalone exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: SchoolLivePlayer-${{ steps.version.outputs.VERSION }}-standalone
          path: dist/SchoolLivePlayer.exe

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: SchoolLivePlayer-${{ steps.version.outputs.VERSION }}-setup
          path: installer/SchoolLiveSetup.exe

      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          name: "SchoolLive Player ${{ steps.version.outputs.VERSION }}"
          draft: false
          prerelease: false
          files: |
            dist/SchoolLivePlayer.exe
            installer/SchoolLiveSetup.exe
          body: |
            ## SchoolLive Player ${{ steps.version.outputs.VERSION }}

            ### Telepítés
            - **SchoolLiveSetup.exe** – ajánlott, telepítővarázslóval
            - **SchoolLivePlayer.exe** – standalone, telepítés nélkül futtatható

            ### Követelmények
            - Windows 10 vagy újabb (64 bit)
            - Internetkapcsolat a SchoolLive szerverhez
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}